# Deploy backend image to ECR/ECS and static frontend to S3/CloudFront.
# Prerequisites: Terraform applied once; GitHub OIDC IAM role; repository secrets set.
#
# Required secrets:
#   AWS_ROLE_TO_ASSUME  — IAM role ARN (OIDC trust to this repo)
#   VITE_API_BASE_URL     — e.g. http://cw3-api-xxxxx.us-east-1.elb.amazonaws.com (match ALB listener: HTTP or HTTPS)
#   S3_FRONTEND_BUCKET    — bucket id from terraform output frontend_bucket_id
#   CLOUDFRONT_DIST_ID    — from terraform output cloudfront_distribution_id
#
# Optional:
#   ECS_CLUSTER_NAME      — default cw3-cluster
#   ECS_SERVICE_NAME      — default cw3-backend
#   ECR_REPOSITORY        — default cw3-backend

name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_NAME="${REPO:-cw3-backend}"
          docker build -t "$REGISTRY/$REPO_NAME:$IMAGE_TAG" -t "$REGISTRY/$REPO_NAME:latest" ./backend
          docker push "$REGISTRY/$REPO_NAME:$IMAGE_TAG"
          docker push "$REGISTRY/$REPO_NAME:latest"

      - name: Update ECS service
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          CLUSTER_NAME="${CLUSTER:-cw3-cluster}"
          SERVICE_NAME="${SERVICE:-cw3-backend}"
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --force-new-deployment \
            --region "$AWS_REGION"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: state-of-the-race/package-lock.json

      - name: Install and build
        working-directory: state-of-the-race
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Sync to S3
        env:
          BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}
        run: |
          aws s3 sync state-of-the-race/dist "s3://$BUCKET" --delete

      - name: Invalidate CloudFront
        env:
          DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}
        run: |
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
